name: Auto-release plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    uses: EliasSchlie/claude-plugins/.github/workflows/plugin-release.yml@main
    with:
      plugin-name: open-cockpit
      run-tests: true
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
