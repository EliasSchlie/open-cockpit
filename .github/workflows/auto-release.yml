name: Auto-release plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    uses: EliasSchlie/claude-plugins/.github/workflows/plugin-release.yml@main
    with:
      plugin-name: open-cockpit
      run-tests: true
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  notify-failure:
    needs: release
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Plugin auto-release failed (${context.sha.slice(0, 7)})`;
            const body = [
              `The auto-release workflow failed for commit [\`${context.sha.slice(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}).`,
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit message:** ${context.payload.head_commit?.message?.split('\n')[0] || 'unknown'}`,
              '',
              'Plugin users will not receive this update until the release is fixed.',
            ].join('\n');

            // Don't create duplicates — check for open issues with same title
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'release-failure',
            });
            if (existing.some(i => i.title === title)) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['release-failure'],
            });
