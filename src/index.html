<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Open Cockpit</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Sessions</h2>
        <div id="sidebar-actions">
          <button id="new-session-btn" title="New Claude session">+</button>
          <button id="pool-settings-btn" title="Pool settings">⚙</button>
          <button id="refresh-btn" title="Refresh sessions">↻</button>
        </div>
      </div>
      <ul id="session-list"></ul>
    </aside>
    <main id="main-area">
      <div id="empty-state">
        <p>Select a session to edit its intention</p>
      </div>
      <div id="session-view" class="hidden">
        <div id="dock-dragbar"></div>
        <div id="dock-container"></div>
      </div>
    </main>
  </div>
  <div id="command-palette">
    <div id="command-palette-dialog">
      <input id="command-palette-input" type="text" placeholder="Type a command..." autocomplete="off" spellcheck="false">
      <div id="command-palette-list"></div>
    </div>
  </div>
  <script src="../dist/renderer.js"></script>
</body>
</html>
